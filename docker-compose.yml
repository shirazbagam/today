services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    ports:
      - "${API_SERVER_PORT:-3000}:${API_SERVER_PORT:-3000}"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      PORT: ${API_SERVER_PORT:-3000}
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: artifacts/admin/Dockerfile
    ports:
      - "${ADMIN_APP_PORT:-5179}:${ADMIN_APP_PORT:-5179}"
    env_file:
      - .env
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api-server:3000}
      VITE_API_URL: ${VITE_API_URL:-/api}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api-server
    command:
      - pnpm
      - run
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "${ADMIN_APP_PORT:-5179}"
      - --base
      - /admin/

  rider-app:
    build:
      context: .
      dockerfile: artifacts/rider-app/Dockerfile
    ports:
      - "${RIDER_APP_PORT:-5180}:${RIDER_APP_PORT:-5180}"
    env_file:
      - .env
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api-server:3000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api-server
    command:
      - pnpm
      - run
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "${RIDER_APP_PORT:-5180}"
      - --base
      - /rider/

  vendor-app:
    build:
      context: .
      dockerfile: artifacts/vendor-app/Dockerfile
    ports:
      - "${VENDOR_APP_PORT:-5181}:${VENDOR_APP_PORT:-5181}"
    env_file:
      - .env
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api-server:3000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api-server
    command:
      - pnpm
      - run
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "${VENDOR_APP_PORT:-5181}"
      - --base
      - /vendor/

  customer-app:
    build:
      context: .
      dockerfile: artifacts/ajkmart/Dockerfile
    ports:
      - "${CUSTOMER_APP_PORT:-5200}:${CUSTOMER_APP_PORT:-5200}"
    env_file:
      - .env
    environment:
      EXPO_PUBLIC_DOMAIN: ${EXPO_PUBLIC_DOMAIN:-http://localhost:3000}
      PORT: ${CUSTOMER_APP_PORT:-5200}
    depends_on:
      - api-server
    command:
      - pnpm
      - exec
      - expo
      - start
      - --web
      - --port
      - "${CUSTOMER_APP_PORT:-5200}"
      - --host
      - lan
